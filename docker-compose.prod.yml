services:
  open-webui-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_OLLAMA: "false"
        USE_CUDA: "false"
    image: coach-on:prod
    container_name: coach-on-prod
    volumes:
      - open-webui-prod-data:/app/backend/data
    ports:
      - "8080:8080"
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - WEBUI_NAME=Coach-On
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2.0"

volumes:
  open-webui-prod-data: {}
