services:
  open-webui-prod:
    image: ghcr.io/open-webui/open-webui:main
    container_name: coach-on-prod
    volumes:
      - open-webui-prod-data:/app/backend/data
    ports:
      - "8080:8080"
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - WEBUI_NAME=Coach-On
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui-prod-data: {}
